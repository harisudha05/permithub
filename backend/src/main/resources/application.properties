spring.application.name=permithub-backend

# Load optional local .env-style file (not committed to Git)
# Create a `.env` file in the backend folder with keys used below.
spring.config.import=optional:file:.env[.properties]

# ── Database ──────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3307/permithub_db?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:12345}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA ───────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── JWT ───────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:change_this_in_production}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ── Server ────────────────────────────────────────────────
server.port=8080
server.servlet.context-path=/api

# ── File Upload ───────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=./uploads

# ── Mail (Gmail SMTP) ─────────────────────────────────────
# Configure via environment variables or backend/.env
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
app.mail.from=${MAIL_FROM:${MAIL_USERNAME:}}

# ── Twilio (WhatsApp) ─────────────────────────────────────
# Configure via environment variables or backend/.env
twilio.account-sid=${TWILIO_ACCOUNT_SID:NOT_CONFIGURED}
twilio.auth-token=${TWILIO_AUTH_TOKEN:NOT_CONFIGURED}
twilio.whatsapp-from=${TWILIO_WHATSAPP_FROM:whatsapp:+14155238886}

# ── Fast2SMS (Indian SMS) ─────────────────────────────────
fast2sms.api-key=${FAST2SMS_API_KEY:}
fast2sms.enabled=${FAST2SMS_ENABLED:false}

# ── App ───────────────────────────────────────────────────
app.frontend-url=${APP_FRONTEND_URL:http://localhost:3000}
app.backend-url=${APP_BACKEND_URL:http://localhost:8080/api}
app.parent-approval-expiry-hours=24
app.outpass-max-hours=48
app.leave-max-days=10
app.leave-default-balance=20

# ── Logging ───────────────────────────────────────────────
logging.level.com.permithub=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.mail=DEBUG

# ── Google Sheets (optional) ──────────────────────────────
google.sheets.enabled=false

# Disable Spring auto-config for mail (we configure it manually in MailConfig.java)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration,org.springframework.boot.autoconfigure.mail.MailSenderValidatorAutoConfiguration
